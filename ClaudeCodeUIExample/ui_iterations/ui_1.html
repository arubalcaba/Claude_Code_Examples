<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #DDA0DD 0%, #E6E6FA 100%);
            min-height: 100vh;
        }
        
        .task-item {
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }
        
        .completed {
            opacity: 0.6;
        }
        
        .completed .task-text {
            text-decoration: line-through;
        }
        
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 2px solid #E9ECEF;
            appearance: none;
            cursor: pointer;
            position: relative;
            background: white;
        }
        
        input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8A8A 100%);
            border-color: #FF6B6B;
        }
        
        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .add-button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8A8A 100%);
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .add-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
        }
    </style>
</head>
<body>
    <div style="max-width: 375px; margin: 0 auto; padding: 16px; min-height: 100vh;">
        <!-- Header -->
        <div style="margin-bottom: 24px; padding-top: 32px;">
            <h1 style="font-size: 30px; font-weight: 700; line-height: 1.2; color: #343A40; margin-bottom: 8px;">My Tasks</h1>
            <p style="font-size: 16px; font-weight: 400; line-height: 1.5; color: #6C757D;">Stay organized and productive</p>
        </div>
        
        <!-- Add Task Form -->
        <div style="margin-bottom: 24px;">
            <div style="display: flex; gap: 8px;">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    style="flex: 1; padding: 16px 20px; border: none; border-radius: 25px; font-size: 16px; background: white; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); outline: none;"
                >
                <button 
                    onclick="addTask()"
                    class="add-button"
                    style="padding: 16px 32px; color: white; border-radius: 25px; font-size: 16px; font-weight: 600; border: none; min-height: 48px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;"
                >
                    Add
                </button>
            </div>
        </div>
        
        <!-- Task List -->
        <div id="taskList" style="display: flex; flex-direction: column; gap: 16px;">
            <!-- Sample tasks -->
            <div class="task-item" style="display: flex; align-items: center; gap: 16px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
                <input type="checkbox" onchange="toggleTask(this)">
                <span class="task-text" style="font-size: 16px; font-weight: 400; line-height: 1.5; color: #343A40; flex: 1;">Review project requirements</span>
                <button onclick="deleteTask(this)" style="color: #6C757D; background: none; border: none; cursor: pointer; padding: 4px; transition: color 200ms;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
            
            <div class="task-item" style="display: flex; align-items: center; gap: 16px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
                <input type="checkbox" onchange="toggleTask(this)">
                <span class="task-text" style="font-size: 16px; font-weight: 400; line-height: 1.5; color: #343A40; flex: 1;">Update documentation</span>
                <button onclick="deleteTask(this)" style="color: #6C757D; background: none; border: none; cursor: pointer; padding: 4px; transition: color 200ms;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
            
            <div class="task-item completed" style="display: flex; align-items: center; gap: 16px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
                <input type="checkbox" checked onchange="toggleTask(this)">
                <span class="task-text" style="font-size: 16px; font-weight: 400; line-height: 1.5; color: #343A40; flex: 1;">Setup development environment</span>
                <button onclick="deleteTask(this)" style="color: #6C757D; background: none; border: none; cursor: pointer; padding: 4px; transition: color 200ms;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Stats -->
        <div style="margin-top: 32px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
            <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 400; line-height: 1.4; color: #6C757D;">
                <span id="totalTasks">3 tasks</span>
                <span id="completedTasks">1 completed</span>
            </div>
        </div>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            
            if (taskText === '') return;
            
            const taskList = document.getElementById('taskList');
            const taskItem = document.createElement('div');
            taskItem.className = 'task-item';
            taskItem.style.cssText = 'display: flex; align-items: center; gap: 16px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);';
            
            taskItem.innerHTML = `
                <input type="checkbox" onchange="toggleTask(this)">
                <span class="task-text" style="font-size: 16px; font-weight: 400; line-height: 1.5; color: #343A40; flex: 1;">${taskText}</span>
                <button onclick="deleteTask(this)" style="color: #6C757D; background: none; border: none; cursor: pointer; padding: 4px; transition: color 200ms;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            `;
            
            taskList.appendChild(taskItem);
            input.value = '';
            updateStats();
        }
        
        function toggleTask(checkbox) {
            const taskItem = checkbox.closest('.task-item');
            if (checkbox.checked) {
                taskItem.classList.add('completed');
            } else {
                taskItem.classList.remove('completed');
            }
            updateStats();
        }
        
        function deleteTask(button) {
            const taskItem = button.closest('.task-item');
            taskItem.remove();
            updateStats();
        }
        
        function updateStats() {
            const tasks = document.querySelectorAll('.task-item');
            const completedTasks = document.querySelectorAll('.task-item.completed');
            
            document.getElementById('totalTasks').textContent = `${tasks.length} tasks`;
            document.getElementById('completedTasks').textContent = `${completedTasks.length} completed`;
        }
        
        // Add task on Enter key
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
        
        // Initial stats update
        updateStats();
    </script>
</body>
</html>
